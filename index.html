<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PointFlow Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#141e30,#243b55);
  color:white;
}
.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}
h1{
  text-align:center;
  margin-bottom:30px;
}
.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.4);
  margin-bottom:20px;
}
input,button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  margin:5px;
}
input{
  background:#f0f0f0;
}
button{
  cursor:pointer;
  font-weight:bold;
}
.btn-add{background:#00c853;color:white;}
.btn-minus{background:#ff5252;color:white;}
.btn-delete{background:#9e9e9e;color:white;}
.btn-login{background:#00b0ff;color:white;}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}
th,td{
  padding:12px;
  text-align:center;
}
th{
  background:#1c2b3a;
}
tr:nth-child(even){
  background:rgba(255,255,255,0.05);
}
.hidden{
  display:none;
}
.rate-box{
  font-size:18px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
<h1>PointFlow Pro</h1>

<div class="card">
<h3>Admin Login</h3>
<input type="password" id="adminPass" placeholder="รหัสผ่าน">
<button class="btn-login" onclick="login()">เข้าสู่ระบบ</button>
</div>

<div class="card hidden" id="adminPanel">
<h3>เพิ่มลูกทีม</h3>
<input id="name" placeholder="ชื่อ">
<input id="amount" type="number" placeholder="ยอดเงิน">
<button class="btn-add" onclick="addMember()">เพิ่ม</button>
</div>

<div class="card">
<h3>ตารางคะแนน</h3>
<table>
<thead>
<tr>
<th>ชื่อ</th>
<th>ยอดเงิน</th>
<th>เรท 0.15</th>
<th>คะแนน</th>
<th>จัดการ</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<script>
const ADMIN_PASSWORD = "1234";
let data = JSON.parse(localStorage.getItem("pointflow")) || {};

function login(){
  if(document.getElementById("adminPass").value === ADMIN_PASSWORD){
    document.getElementById("adminPanel").classList.remove("hidden");
    alert("เข้าสู่ระบบสำเร็จ");
  } else {
    alert("รหัสผิด");
  }
}

function addMember(){
  let name = document.getElementById("name").value;
  let amount = parseFloat(document.getElementById("amount").value);

  if(!name || !amount) return alert("กรอกข้อมูลให้ครบ");

  let point = amount * 0.15;

  data[name] = {
    amount: amount,
    rate: point,
    point: point
  };

  save();
}

function updatePoint(name, value){
  data[name].point += value;
  save();
}

function deleteMember(name){
  if(confirm("ลบข้อมูล?")){
    delete data[name];
    save();
  }
}

function save(){
  localStorage.setItem("pointflow", JSON.stringify(data));
  render();
}

function render(){
  let html="";
  for(let name in data){
    html += `
    <tr>
      <td>${name}</td>
      <td>${data[name].amount}</td>
      <td>${data[name].rate.toFixed(2)}</td>
      <td><b>${data[name].point.toFixed(2)}</b></td>
      <td>
        <button class="btn-add" onclick="updatePoint('${name}',10)">+10</button>
        <button class="btn-minus" onclick="updatePoint('${name}',-10)">-10</button>
        <button class="btn-delete" onclick="deleteMember('${name}')">ลบ</button>
      </td>
    </tr>
    `;
  }
  document.getElementById("tableBody").innerHTML = html;
}

render();
</script>

</body>
</html>
